name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt httpx pytest

      - name: Seed the database (plants fraud rings + counterfeits)
        working-directory: backend
        run: python -m app.seed

      - name: Run smoke tests (real agents over real data)
        run: pytest tests -q

  fallback-mode:
    # Proves the platform runs with ZERO compiled ML deps — the path that
    # Vercel serverless and DLL-locked Windows machines take.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install slim (Vercel) dependencies only
        run: pip install -r requirements.txt httpx pytest

      - name: Seed the database
        working-directory: backend
        run: python -m app.seed

      - name: Run the same smoke tests on the pure-Python fraud backend
        run: pytest tests -q
